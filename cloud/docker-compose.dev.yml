name: mainroot

services:
  backend:
    image: node:20-alpine
    container_name: mainroot_backend_dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../backend:/app
      # Ignorar la carpeta de módulos local para no causar conflictos con Alpine
      - /app/node_modules
    environment:
      - PORT=3000
      - NODE_ENV=development
    env_file:
      - ../backend/.env
    # Comando para instalar e iniciar nodemon
    command: sh -c "npm install && npm run dev"
    networks:
      - mainroot_network

  frontend:
    image: node:20-alpine
    container_name: mainroot_frontend_dev
    working_dir: /app
    ports:
      - "5173:5173" # Puerto por defecto de Vite
    volumes:
      - ../frontend:/app
      - /app/node_modules
    # Comando para instalar e iniciar Vite exponiéndolo a la red
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - mainroot_network

networks:
  mainroot_network:
    driver: bridge
